name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  # Silence the Node 20 deprecation; run JS actions on Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build

      - name: Install rpm tooling (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Package
        run: pnpm exec electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.yml
            release/*.blockmap
            !release/builder-debug.yml
          if-no-files-found: warn

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Git tag version ($TAG) does not match package.json version ($PKG). Bump package.json first, commit, then tag v$PKG."
            exit 1
          fi
          echo "Release version $PKG matches tag."

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: dist-*
          merge-multiple: true

      - name: List release files
        run: find release-assets -type f | sort

      # Pick the previous release by version order, not git ancestry. Release
      # tags have historically landed off main's lineage (squash-merges), so
      # GitHub's auto "previous tag" detection walks back to v1.0.0 and dumps
      # every PR into the notes. Selecting the prior tag explicitly keeps the
      # changelog scoped to changes since the last release.
      - name: Compute previous release tag
        id: prev
        run: |
          PREV=$(git tag --sort=-v:refname | grep -vx "${GITHUB_REF_NAME}" | head -1)
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"
          echo "Previous release tag: ${PREV:-<none>}"

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          shopt -s globstar nullglob
          assets=()
          for f in release-assets/**/*; do
            [ -f "$f" ] && assets+=("$f")
          done
          if [ ${#assets[@]} -eq 0 ]; then
            echo "::error::No release assets found under release-assets/"
            exit 1
          fi
          ARGS=(--title "${GITHUB_REF_NAME}" --generate-notes)
          if [ -n "${{ steps.prev.outputs.tag }}" ]; then
            ARGS+=(--notes-start-tag "${{ steps.prev.outputs.tag }}")
          fi
          gh release create "${GITHUB_REF_NAME}" "${ARGS[@]}" "${assets[@]}"
