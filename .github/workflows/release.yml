name: Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build:stable

      # https://github.com/blackboardsh/electrobun/issues/429 — patch icons in CI only
      - name: Embed Windows icons (Electrobun rcedit workaround)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./.github/scripts/embed-win-icons.ps1

      # NSIS is not preinstalled on windows-latest (Server 2025)
      - name: Install NSIS
        if: runner.os == 'Windows'
        uses: negrutiu/nsis-install@v2

      - name: Build NSIS installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./.github/scripts/build-win-installer.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: artifacts/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Git tag version ($TAG) does not match package.json version ($PKG). Bump package.json first, commit, then tag v$PKG."
            exit 1
          fi
          echo "Release version $PKG matches tag."
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: dist-*
          merge-multiple: true
      - name: List release files
        run: find release-assets -type f | sort
      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
