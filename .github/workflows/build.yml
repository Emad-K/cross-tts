name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Silence the Node 20 deprecation; run JS actions on Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build renderer + main + preload
        run: pnpm run build

      - name: Install rpm tooling (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Package
        run: pnpm exec electron-builder --publish never
        env:
          # No code-signing configured; don't try to discover certificates.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # Packaging above stays on every run to catch electron-builder breakage,
      # but installers only get stored when requested manually — release.yml
      # handles real releases, and 90-day default retention on ~3 GB per run
      # was burning the Actions storage quota.
      - name: Upload artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          retention-days: 3
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.yml
            release/*.blockmap
            !release/builder-debug.yml
          if-no-files-found: warn

  # Playwright drives the *built* Electron app (out/main/index.js) under Xvfb
  # and opens a CRLF EPUB fixture — the class of bug that passes happy-dom unit
  # tests but breaks read-along offsets in real Chromium. Electron ships its own
  # browser binary, so no `playwright install` is needed; only Xvfb for a display.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer + main + preload
        run: pnpm run build

      - name: Ensure Xvfb is available
        run: command -v xvfb-run >/dev/null || (sudo apt-get update && sudo apt-get install -y xvfb)

      - name: E2E smoke (Playwright + Electron)
        run: xvfb-run --auto-servernum -- pnpm run test:e2e

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          retention-days: 7
          path: test-results/
          if-no-files-found: ignore
