appId: dev.cross-tts.app
productName: Cross TTS
copyright: Cross TTS
# Overrides the package.json description for build metadata, including the
# Windows exe FileDescription (the name shown in Task Manager).
extraMetadata:
  description: Cross TTS

directories:
  output: release
  buildResources: assets

# electron-vite emits main/preload/renderer here; package.json is needed for asar.
files:
  - out/**
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,*.flow,*.mk,*.d.ts,*.map}"

asar: true
npmRebuild: false

# onnxruntime-node's native libraries can't be loaded from inside the asar.
asarUnpack:
  - "**/node_modules/onnxruntime-node/**"

# Tells electron-updater where to look for new versions (embedded as
# app-update.yml). CI still uploads assets manually (--publish never); this only
# configures the update feed, it does not publish.
publish:
  provider: github
  owner: Emad-K
  repo: cross-tts

# Consistent, space-free names with version + arch for every target.
artifactName: ${name}-${version}-${arch}.${ext}

# onnxruntime-node ships native binaries for every OS (~100+ MB each); keep
# only the target platform's out of each installer.
win:
  files:
    - "!**/node_modules/onnxruntime-node/bin/napi-v3/{darwin,linux}/**"
  icon: assets/windows/icon_256x256.png
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${name}-${version}-setup-${arch}.${ext}

portable:
  artifactName: ${name}-${version}-portable-${arch}.${ext}

mac:
  files:
    - "!**/node_modules/onnxruntime-node/bin/napi-v3/{win32,linux}/**"
  icon: assets/icon.iconset
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64

linux:
  files:
    - "!**/node_modules/onnxruntime-node/bin/napi-v3/{darwin,win32}/**"
  icon: assets/linux/icon_256x256.png
  category: AudioVideo
  maintainer: Emad Kazemi <emadkazemi310@gmail.com>
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
        - arm64

# Custom deb maintainer scripts. These REPLACE electron-builder's default
# after-install/after-remove templates (so the scripts reproduce that default
# work) and add an AppArmor profile granting user namespaces — without it the
# app fails to launch on Ubuntu 24.04+, where unprivileged userns is restricted
# and Electron's sandbox needs it. See assets/linux/deb-after-install.sh.
deb:
  afterInstall: assets/linux/deb-after-install.sh
  afterRemove: assets/linux/deb-after-remove.sh
